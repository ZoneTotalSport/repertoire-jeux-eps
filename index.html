<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Répertoire de Jeux EPS | 310 Jeux - PFEQ</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo">
        <span class="logo-icon">🏃</span>
        <div class="logo-text">
          <h1>Répertoire EPS</h1>
          <span class="logo-subtitle">310 jeux &bull; PFEQ Primaire</span>
        </div>
      </div>
    </div>
    <div class="header-center">
      <div class="search-container">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Rechercher un jeu, matériel, variante...">
        <button class="search-clear" id="searchClear" aria-label="Effacer">&times;</button>
      </div>
    </div>
    <div class="header-right">
      <button class="header-btn" id="favoritesBtn" title="Mes favoris">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span class="fav-count" id="favCount">0</span>
      </button>
      <button class="header-btn" id="themeToggle" title="Mode sombre">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="main-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <div class="sidebar-content">
        <!-- Categories -->
        <div class="sidebar-section">
          <h3 class="sidebar-title">Catégories</h3>
          <div class="category-list" id="categoryList">
            <button class="category-btn active" data-category="all">
              <span class="cat-icon">📋</span>
              <span class="cat-name">Toutes les catégories</span>
              <span class="cat-count" id="countAll">310</span>
            </button>
            <button class="category-btn" data-category="ballons-chasseurs">
              <span class="cat-icon">🔴</span>
              <span class="cat-name">Ballons chasseurs</span>
              <span class="cat-count" id="countBallons">60</span>
            </button>
            <button class="category-btn" data-category="poursuites">
              <span class="cat-icon">🏃</span>
              <span class="cat-name">Jeux de poursuites</span>
              <span class="cat-count" id="countPoursuites">50</span>
            </button>
            <button class="category-btn" data-category="ludiques">
              <span class="cat-icon">🎮</span>
              <span class="cat-name">Jeux ludiques/coopératifs</span>
              <span class="cat-count" id="countLudiques">50</span>
            </button>
            <button class="category-btn" data-category="collectifs">
              <span class="cat-icon">⚽</span>
              <span class="cat-name">Jeux collectifs</span>
              <span class="cat-count" id="countCollectifs">50</span>
            </button>
            <button class="category-btn" data-category="opposition">
              <span class="cat-icon">🤼</span>
              <span class="cat-name">Jeux d'opposition</span>
              <span class="cat-count" id="countOpposition">50</span>
            </button>
            <button class="category-btn" data-category="duels">
              <span class="cat-icon">⚔️</span>
              <span class="cat-name">Jeux de duels</span>
              <span class="cat-count" id="countDuels">50</span>
            </button>
          </div>
        </div>

        <!-- Duration Filter -->
        <div class="sidebar-section">
          <h3 class="sidebar-title">Durée</h3>
          <div class="filter-chips" id="durationFilter">
            <button class="chip active" data-duration="all">Toutes</button>
            <button class="chip" data-duration="10">≤ 15 min</button>
            <button class="chip" data-duration="15">15-20 min</button>
            <button class="chip" data-duration="20">20-30 min</button>
            <button class="chip" data-duration="30">30+ min</button>
          </div>
        </div>

        <!-- PFEQ Competencies -->
        <div class="sidebar-section">
          <h3 class="sidebar-title">Compétences PFEQ</h3>
          <div class="filter-chips" id="pfeqFilter">
            <button class="chip active" data-pfeq="all">Toutes</button>
            <button class="chip" data-pfeq="C1">C1 – Agir</button>
            <button class="chip" data-pfeq="C2">C2 – Interagir</button>
            <button class="chip" data-pfeq="C3">C3 – Mode de vie</button>
          </div>
        </div>

        <!-- Material Filter -->
        <div class="sidebar-section">
          <h3 class="sidebar-title">Matériel</h3>
          <div class="filter-chips wrap" id="materialFilter">
            <button class="chip active" data-material="all">Tout</button>
            <button class="chip" data-material="ballon">Ballon</button>
            <button class="chip" data-material="frite">Frite</button>
            <button class="chip" data-material="cône">Cônes</button>
            <button class="chip" data-material="foulard">Foulard</button>
            <button class="chip" data-material="tapis">Tapis</button>
            <button class="chip" data-material="cerceau">Cerceaux</button>
            <button class="chip" data-material="dossard">Dossards</button>
            <button class="chip" data-material="corde">Corde</button>
            <button class="chip" data-material="raquette">Raquette</button>
          </div>
        </div>

        <!-- Reset -->
        <div class="sidebar-section">
          <button class="reset-btn" id="resetFilters">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            Réinitialiser les filtres
          </button>
        </div>
      </div>
    </aside>

    <!-- CONTENT -->
    <main class="content" id="content">
      <!-- Stats Bar -->
      <div class="stats-bar" id="statsBar">
        <div class="stats-left">
          <span class="results-count" id="resultsCount">310 jeux</span>
          <span class="active-filters" id="activeFilters"></span>
        </div>
        <div class="stats-right">
          <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="Grille">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button class="view-btn" data-view="list" title="Liste">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
          </div>
          <select class="sort-select" id="sortSelect">
            <option value="id">Tri par numéro</option>
            <option value="title">Tri alphabétique</option>
            <option value="duration">Tri par durée</option>
            <option value="category">Tri par catégorie</option>
          </select>
        </div>
      </div>

      <!-- Game Grid -->
      <div class="game-grid" id="gameGrid"></div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display:none">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>Aucun jeu trouvé</h3>
        <p>Essayez de modifier vos critères de recherche ou filtres.</p>
        <button class="reset-btn" onclick="resetAll()">Réinitialiser tout</button>
      </div>

      <!-- Game Detail Modal -->
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="gameModal">
          <div class="modal-header">
            <button class="modal-close" id="modalClose" aria-label="Fermer">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="modal-body" id="modalBody"></div>
        </div>
      </div>

      <!-- Favorites View -->
      <div class="favorites-view" id="favoritesView" style="display:none">
        <div class="fav-header">
          <h2>⭐ Mes favoris</h2>
          <button class="back-btn" id="backFromFav">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Retour
          </button>
        </div>
        <div class="fav-grid" id="favGrid"></div>
        <div class="fav-empty" id="favEmpty" style="display:none">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <h3>Aucun favori</h3>
          <p>Cliquez sur l'étoile ⭐ d'un jeu pour l'ajouter à vos favoris.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- SCRIPTS -->
  <script src="games-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
